# Global 3D animation caption guidelines
caption_style:
  prefix: "a 3d animated character"
  emphasis:
    - "Pixar-style rendering"
    - "smooth shading"
    - "glossy materials"
    - "cinematic lighting"
    - "clean anti-aliased edges"

  avoid:
    - "realistic"
    - "photographic"
    - "2d anime"
    - "hand-drawn"

# Material descriptions (3D-specific)
materials:
  metal: "glossy metallic surface, specular highlights, reflective"
  plastic: "smooth matte plastic, slight sheen"
  glass: "transparent glass, refractions, reflections"

# Lighting types (common in 3D animation)
lighting:
  studio: "even studio lighting, soft shadows, three-point setup"
  outdoor: "bright daylight, warm sunlight, natural shadows"
  dramatic: "dramatic side lighting, strong shadows, high contrast"
  soft: "soft diffused lighting, minimal shadows, flat illumination"

# Camera angles (3D terminology)
camera_angles:
  front: "front view, facing camera, symmetrical"
  three_quarter: "three-quarter view, angled toward camera"
  side: "side view, profile, perpendicular to camera"
  back: "back view, facing away from camera"
  low: "low angle, looking up, heroic perspective"
  high: "high angle, looking down, bird's eye view"
