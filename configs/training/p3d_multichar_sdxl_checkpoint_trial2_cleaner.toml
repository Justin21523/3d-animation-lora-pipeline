# ============================================================================
# P3D Multi-Character SDXL LoRA (Trial 2 - Cleaner / Less Grainy)
# ============================================================================
#
# Focus:
# - Keep 2-character interaction stability (pairs remain significant)
# - Reduce "grain / sand" and mild blur seen in Kohya sample images
#
# Main changes vs trial1:
# - Disable noise_offset (common source of grainy texture)
# - Lower LR (reduce base quality damage)
# - Train UNet only (avoid TE drift that can degrade overall image quality)
# - Use cleaner sampler for training-time samples
#
# Dataset:
#   /mnt/data/ai_data/synthetic_lora_data/kohya_dataset_p3d_multichar_20260129
#
# ============================================================================

[model]
pretrained_model_name_or_path = "/mnt/c/ai_models/stable-diffusion/checkpoints/sd_xl_base_1.0.safetensors"
vae = "/mnt/c/ai_models/stable-diffusion/vae/sdxl_vae.safetensors"
sdxl = true

[paths]
train_data_dir = "/mnt/data/ai_data/synthetic_lora_data/kohya_dataset_p3d_multichar_20260129"
output_dir = "/mnt/data/ai_data/models/lora/p3d_multichar/sdxl_checkpoint_trial2"
output_name = "p3d_multichar_sdxl_trial2"
logging_dir = "/mnt/c/ai_projects/3d-animation-lora-pipeline/logs/p3d_multichar_training/trial2"
log_prefix = "p3d_multichar_trial2"
log_with = "tensorboard"

[network]
network_module = "networks.lora"
network_dim = 96
network_alpha = 48
network_dropout = 0.0
conv_dim = 0
conv_alpha = 0

[training]
optimizer_type = "AdamW8bit"
optimizer_args = ["weight_decay=0.01", "betas=0.9,0.999"]

mixed_precision = "bf16"
save_precision = "bf16"
full_bf16 = true

gradient_checkpointing = true
train_batch_size = 1
gradient_accumulation_steps = 4

learning_rate = 5e-5
unet_lr = 5e-5
text_encoder_lr = 0

lr_scheduler = "cosine_with_restarts"
lr_scheduler_num_cycles = 1
lr_warmup_steps = 100

min_snr_gamma = 5.0
noise_offset = 0.0

max_train_epochs = 1
save_every_n_epochs = 1
keep_only_last_n_checkpoints = 2
save_model_as = "safetensors"

cache_latents = true
cache_latents_to_disk = true
cache_text_encoder_outputs = false
cache_text_encoder_outputs_to_disk = false
vae_batch_size = 1

[dataset]
resolution = "1024,1024"
enable_bucket = false
min_bucket_reso = 1024
max_bucket_reso = 1024
bucket_reso_steps = 64
bucket_no_upscale = true

caption_extension = ".txt"
max_token_length = 225
shuffle_caption = false
keep_tokens = 4

color_aug = false
flip_aug = false

[advanced]
seed = 42
max_grad_norm = 1.0

# SDXL: train UNet only to preserve overall quality
network_train_unet_only = true
network_train_text_encoder_only = false

# RTX 5080 compatibility
xformers = false
mem_eff_attn = false
sdpa = true

[sample_generation]
sample_every_n_epochs = 1
sample_prompts = "/mnt/c/ai_projects/3d-animation-lora-pipeline/prompts/p3d/p3d_multichar_validation_prompts.txt"
sample_sampler = "dpmpp_2m_karras"
sample_steps = 35

