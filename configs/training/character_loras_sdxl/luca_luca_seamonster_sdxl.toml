# SDXL Character Identity LoRA Training Config - Sea Monster Form
# Character: Luca (Sea Monster Form) from Luca (Pixar, 2021)
# Dataset: 255 images × 4 repeats = 1020 steps/epoch
# Target: 8 epochs (8160 total steps) - OPTIMIZED TO PREVENT OVERFITTING
#
# OPTIMIZATION NOTES (based on Alberto training):
# - Alberto showed best results at Epoch 4, severe overfitting after Epoch 8
# - Reduced from 10 → 8 epochs to stop at known overfitting point
# - Added network_dropout = 0.1 for better generalization
# - Slightly reduced learning rate for final epochs
# - Save EVERY epoch (1,2,3,4,5,6,7,8) to find exact optimal point

[model]
pretrained_model_name_or_path = "/mnt/c/ai_models/stable-diffusion/checkpoints/sd_xl_base_1.0.safetensors"
v2 = false
v_parameterization = false
sdxl = true

network_module = "networks.lora"
network_dim = 64
network_alpha = 32
network_dropout = 0.1  # CHANGED: Added dropout to prevent overfitting (was 0.0)
network_args = []

[paths]
train_data_dir = "/mnt/data/datasets/general/luca/sdxl_seamonster_training/luca_seamonster_prepared"
output_dir = "/mnt/c/ai_models/lora_sdxl/luca/luca_seamonster_identity"
output_name = "luca_seamonster_lora_sdxl"
logging_dir = "/mnt/c/ai_models/lora_sdxl/luca/luca_seamonster_identity/logs"
log_prefix = "luca_seamonster_sdxl"

[training]
optimizer_type = "AdamW8bit"
mixed_precision = "bf16"
full_bf16 = true
gradient_checkpointing = true

train_batch_size = 1
gradient_accumulation_steps = 2

learning_rate = 0.00008  # CHANGED: Slightly reduced from 0.0001
text_encoder_lr = 0.00005  # CHANGED: Slightly reduced from 0.00006
unet_lr = 0.00008  # CHANGED: Slightly reduced from 0.0001

lr_scheduler = "cosine_with_restarts"
lr_scheduler_num_cycles = 2  # CHANGED: Reduced from 3 to 2 (fewer epochs)
lr_warmup_steps = 100

min_snr_gamma = 5.0
noise_offset = 0.05
adaptive_noise_scale = 0.0
multires_noise_iterations = 0
multires_noise_discount = 0.3

max_train_epochs = 8  # CHANGED: Reduced from 10 to 8
save_every_n_epochs = 1  # CHANGED: Save EVERY epoch (was 2)
save_last_n_epochs = 8  # CHANGED: Keep all 8 checkpoints (was 3)

cache_latents = true
cache_latents_to_disk = false
vae_batch_size = 2

[resolution]
resolution = "1024,1024"
enable_bucket = true
min_bucket_reso = 768
max_bucket_reso = 1280
bucket_reso_steps = 128
bucket_no_upscale = false

[augmentation]
color_aug = false
flip_aug = false
random_crop = false
shuffle_caption = true
keep_tokens = 1

[sample_generation]
# Disabled to maximize training speed - use manual testing instead

[performance]
persistent_data_loader_workers = true
max_data_loader_n_workers = 6
lowram = false
max_token_length = 225
seed = 42
clip_skip = 2
max_grad_norm = 1.0
