# SDXL Character Identity LoRA Training Config
# Project: Win or Lose
# Character: yuwen
# Dataset: 200+ images (augmented), Pixar-style 3D

[model]
pretrained_model_name_or_path = "/mnt/c/ai_models/stable-diffusion/checkpoints/sd_xl_base_1.0.safetensors"
vae = "/mnt/c/ai_models/stable-diffusion/vae/sdxl_vae.safetensors"
sdxl = true

network_module = "networks.lora"
network_dim = 64
network_alpha = 32
network_dropout = 0.0
network_args = []

[paths]
train_data_dir = "/mnt/data/datasets/general/win-or-lose/lora_data/training_data_sdxl/yuwen_identity"
output_dir = "/mnt/data/training/lora/win-or-lose/yuwen_identity"
output_name = "yuwen_identity_lora_sdxl"
logging_dir = "/mnt/data/training/lora/win-or-lose/yuwen_identity/logs"
log_prefix = "win_or_lose_yuwen"

[training]
optimizer_type = "AdamW8bit"
mixed_precision = "bf16"
full_bf16 = true
gradient_checkpointing = true
max_grad_norm = 1.0

train_batch_size = 1
gradient_accumulation_steps = 2
learning_rate = 0.0001
text_encoder_lr = 0.00006
unet_lr = 0.0001

lr_scheduler = "cosine_with_restarts"
lr_scheduler_num_cycles = 2
lr_warmup_steps = 100

min_snr_gamma = 5.0
noise_offset = 0.05

max_train_epochs = 10
save_every_n_epochs = 2
save_last_n_epochs = 3

cache_latents = true
cache_latents_to_disk = true
vae_batch_size = 2

[resolution]
resolution = "1024,1024"
enable_bucket = true
min_bucket_reso = 768
max_bucket_reso = 1280
bucket_reso_steps = 64
bucket_no_upscale = true

[augmentation]
color_aug = false
flip_aug = false
random_crop = false
shuffle_caption = true
keep_tokens = 1  # keep "yuwen"

[sample_generation]
sample_at_first = true
sample_every_n_epochs = 2
sample_prompts = "/mnt/c/ai_projects/3d-animation-lora-pipeline/prompts/win_or_lose/yuwen_identity_test.txt"
sample_sampler = "euler_a"

[performance]
persistent_data_loader_workers = true
max_data_loader_n_workers = 2
lowram = false
max_token_length = 225
seed = 42
