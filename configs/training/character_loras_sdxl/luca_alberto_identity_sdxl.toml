# SDXL Character Identity LoRA Training Config - ANTI-BLUR OPTIMIZED
# Character: Alberto Scorfano (Luca, 2021)
# Dataset: 509 images × 5 repeats = 2545 steps/epoch
# Target: 6 epochs (15270 total steps) - OPTIMIZED FOR BLURRY SOURCE DATA
# Special: Lower LR + Higher SNR gamma to combat motion blur artifacts

[model]
pretrained_model_name_or_path = "/home/b0979/models/sdxl/sd_xl_base_1.0.safetensors"
v2 = false
v_parameterization = false
sdxl = true

network_module = "networks.lora"
network_dim = 32
network_alpha = 16
network_dropout = 0.0
network_args = []

[paths]
train_data_dir = "/mnt/data/ai_data/datasets/3d-anime/luca/lora_data/training_data_sdxl/alberto_identity"
output_dir = "/mnt/data/ai_data/models/lora_sdxl/luca/alberto_identity"
output_name = "alberto_identity_lora_sdxl"
logging_dir = "/mnt/data/ai_data/models/lora_sdxl/luca/alberto_identity/logs"
log_prefix = "alberto_sdxl"

[training]
optimizer_type = "AdamW8bit"
mixed_precision = "bf16"
full_bf16 = true
gradient_checkpointing = true

train_batch_size = 1
gradient_accumulation_steps = 2
learning_rate = 0.00004
text_encoder_lr = 0.00002
unet_lr = 0.00004

lr_scheduler = "cosine_with_restarts"
lr_scheduler_num_cycles = 3
lr_warmup_steps = 100

min_snr_gamma = 8.0
noise_offset = 0.15
adaptive_noise_scale = 0.0
multires_noise_iterations = 0
multires_noise_discount = 0.3

max_train_epochs = 6
save_every_n_epochs = 1
save_last_n_epochs = 3

cache_latents = true
cache_latents_to_disk = false
vae_batch_size = 2
[resolution]
resolution = "1024,1024"
enable_bucket = true
min_bucket_reso = 768
max_bucket_reso = 1280
bucket_reso_steps = 128
bucket_no_upscale = false

[augmentation]
color_aug = false
flip_aug = false
random_crop = false
shuffle_caption = true
keep_tokens = 1

[sample_generation]
sample_every_n_epochs = 1
sample_prompts = "/mnt/c/AI_LLM_projects/3d-animation-lora-pipeline/prompts/lora_testing/alberto_identity_test.txt"
sample_sampler = "euler_a"

[performance]
persistent_data_loader_workers = true
max_data_loader_n_workers = 6
lowram = false
max_token_length = 225
seed = 42
clip_skip = 2
max_grad_norm = 1.0
