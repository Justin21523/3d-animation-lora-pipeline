# Bryce Markwell (Elio 2025) - Identity LoRA Training Config
# Based on Trial 3.6 FINAL (proven best configuration)
# Adjusted for 201 training images (augmented)
# Optimized batch size for RTX 5080

# Model
pretrained_model_name_or_path = "/mnt/c/AI_LLM_projects/ai_warehouse/models/stable-diffusion/checkpoints/v1-5-pruned-emaonly.safetensors"
output_name = "bryce_markwell_identity_lora"
output_dir = "/mnt/data/ai_data/models/lora/elio/bryce_identity"

# Network architecture (Trial 3.6 proven settings)
network_module = "networks.lora"
network_dim = 64
network_alpha = 32
network_dropout = 0.1

# Dataset (201 images with identity captions, 20 repeats = 4020 steps per epoch)
train_data_dir = "/mnt/data/ai_data/datasets/3d-anime/elio/lora_data/training_data/bryce_identity"
caption_extension = ".txt"
resolution = "512,512"
enable_bucket = true
min_bucket_reso = 256
max_bucket_reso = 1024
bucket_reso_steps = 64
shuffle_caption = false
keep_tokens = 0

# Training parameters (adjusted for 201 images)
max_train_epochs = 15
train_batch_size = 8
gradient_accumulation_steps = 2
save_every_n_epochs = 3
save_model_as = "safetensors"
save_precision = "fp16"

# Optimizer (Trial 3.6 proven settings)
optimizer_type = "AdamW8bit"
learning_rate = 6e-5
unet_lr = 6e-5
text_encoder_lr = 3e-5
lr_scheduler = "cosine_with_restarts"
lr_scheduler_num_cycles = 2
lr_warmup_steps = 100

# Regularization (Trial 3.6 proven settings)
min_snr_gamma = 5.0
noise_offset = 0.05
max_grad_norm = 1.0

# Data augmentation (conservative for 3D)
color_aug = false
flip_aug = false
random_crop = true

# Advanced settings
mixed_precision = "fp16"
gradient_checkpointing = true
xformers = false
sdpa = true
max_data_loader_n_workers = 4
persistent_data_loader_workers = true

# Logging
logging_dir = "/mnt/data/ai_data/models/lora/elio/bryce_identity/logs"
log_prefix = "bryce_identity"
log_with = "tensorboard"

# Sample generation
sample_prompts = "a 3d animated character, pixar style, bryce markwell, slim black boy, portrait, neutral expression, studio lighting\na 3d animated character, pixar style, bryce markwell, full body, wearing red white shirt and blue striped pants, natural lighting\na 3d animated character, pixar style, bryce markwell, close-up face, friendly expression, soft lighting\na 3d animated character, pixar style, bryce markwell, three-quarter view, holding ham radio, cinematic lighting\na 3d animated character, pixar style, bryce markwell, at camp carver, outdoor lighting\na 3d animated character, pixar style, bryce markwell, wearing scout uniform, natural lighting"
sample_every_n_epochs = 3
sample_sampler = "euler_a"

# Training seed
seed = 42

# Metadata
[metadata]
character_name = "Bryce Markwell"
character_source = "Pixar's Elio (2025)"
film = "Elio"
style = "3D Animation, Pixar Style"
dataset_size = 201
lora_type = "character_identity"
trigger_words = "bryce_markwell, slim_black_boy, red_white_shirt, blue_striped_pants, ham_radio_boy"
notes = "Bryce Markwell Identity LoRA - Based on Trial 3.6 proven configuration. Dataset: 201 augmented character instances (48 original + augmented) with LLMProvider AI generated identity captions. Supporting character with redemption arc from bully to ally."
