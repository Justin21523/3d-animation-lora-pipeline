# Alberto Scorfano (Luca 2021) - Identity LoRA Training Config
# Based on Trial 3.6 FINAL (proven best configuration)
# Dataset: 509 identity images (no augmentation needed)
# Optimized batch size for RTX 5080

# Model
pretrained_model_name_or_path = "/mnt/c/AI_LLM_projects/ai_warehouse/models/stable-diffusion/checkpoints/v1-5-pruned-emaonly.safetensors"
output_name = "alberto_scorfano_identity_lora"
output_dir = "/mnt/data/ai_data/models/lora/luca/alberto_identity"

# Network architecture (Trial 3.6 proven settings)
network_module = "networks.lora"
network_dim = 64
network_alpha = 32
network_dropout = 0.1

# Dataset (509 images with identity captions, 10 repeats = 5090 steps per epoch)
train_data_dir = "/mnt/data/ai_data/datasets/3d-anime/luca/lora_data/training_data/alberto_identity"
caption_extension = ".txt"
resolution = "512,512"
enable_bucket = true
min_bucket_reso = 256
max_bucket_reso = 1024
bucket_reso_steps = 64
shuffle_caption = false
keep_tokens = 0

# Training parameters (optimized for 509 images)
max_train_epochs = 12
train_batch_size = 8
gradient_accumulation_steps = 2
save_every_n_epochs = 2
save_model_as = "safetensors"
save_precision = "fp16"

# Optimizer (Trial 3.6 proven settings)
optimizer_type = "AdamW8bit"
learning_rate = 6e-5
unet_lr = 6e-5
text_encoder_lr = 3e-5
lr_scheduler = "cosine_with_restarts"
lr_scheduler_num_cycles = 2
lr_warmup_steps = 100

# Regularization (Trial 3.6 proven settings)
min_snr_gamma = 5.0
noise_offset = 0.05
max_grad_norm = 1.0

# Data augmentation (conservative for 3D)
color_aug = false
flip_aug = false
random_crop = false

# Advanced settings
mixed_precision = "fp16"
gradient_checkpointing = true
xformers = false
sdpa = true
max_data_loader_n_workers = 4
persistent_data_loader_workers = true

# Logging
logging_dir = "/mnt/data/ai_data/models/lora/luca/alberto_identity/logs"
log_prefix = "alberto_identity"
log_with = "tensorboard"

# Sample generation
sample_prompts = "a 3d animated character from Pixar's Luca (2021), alberto scorfano, teenage boy, portrait, neutral expression, studio lighting\na 3d animated character from Pixar's Luca (2021), alberto scorfano, full body, shirtless with green shorts, italian coastal town, natural lighting\na 3d animated character from Pixar's Luca (2021), alberto scorfano, close-up face, confident expression, warm lighting\na 3d animated character from Pixar's Luca (2021), alberto scorfano, three-quarter view, messy curly hair, cinematic lighting\na 3d animated character from Pixar's Luca (2021), alberto scorfano, at portorosso harbor, golden hour lighting\na 3d animated character from Pixar's Luca (2021), alberto scorfano, wild curly hair, barefoot, summer coastal scene"
sample_every_n_epochs = 2
sample_sampler = "euler_a"

# Training seed
seed = 42

# Metadata
[metadata]
character_name = "Alberto Scorfano"
character_source = "Pixar's Luca (2021)"
film = "Luca"
style = "3D Animation, Pixar Style, Italian Coastal Aesthetic"
dataset_size = 509
lora_type = "character_identity"
trigger_words = "alberto_scorfano, alberto_luca, wild_curly_hair, italian_coastal, sea_monster_boy"
notes = "Alberto Scorfano Identity LoRA - Based on Trial 3.6 proven configuration. Dataset: 509 character instances with LLMProvider AI generated identity captions. Deuteragonist from Luca, Luca's best friend and mentor to surface world. No augmentation needed due to large dataset."
