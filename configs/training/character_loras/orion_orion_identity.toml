# Orion (Orion and the Dark 2024) - Identity LoRA Training Config
# Based on proven Trial 3.6 configuration pattern
# Dataset: ~261 identity images
# DreamWorks Animation Style

# Model
pretrained_model_name_or_path = "/mnt/c/AI_LLM_projects/ai_warehouse/models/stable-diffusion/checkpoints/v1-5-pruned-emaonly.safetensors"
output_name = "orion_identity_lora"
output_dir = "/mnt/data/ai_data/models/lora/orion/orion_identity"

# Network architecture (proven settings from Alberto/Miguel trials)
network_module = "networks.lora"
network_dim = 64
network_alpha = 32
network_dropout = 0.1

# Dataset (261 images with identity captions, 15 repeats = ~3915 steps per epoch)
train_data_dir = "/mnt/data/ai_data/datasets/3d-anime/orion/lora_data/training_data/orion_identity"
caption_extension = ".txt"
resolution = "512,512"
enable_bucket = true
min_bucket_reso = 256
max_bucket_reso = 1024
bucket_reso_steps = 64
shuffle_caption = false
keep_tokens = 0

# Training parameters (adjusted for ~261 images)
max_train_epochs = 12
train_batch_size = 6
gradient_accumulation_steps = 2
save_every_n_epochs = 2
save_model_as = "safetensors"
save_precision = "fp16"

# Optimizer (proven settings)
optimizer_type = "AdamW8bit"
learning_rate = 6e-5
unet_lr = 6e-5
text_encoder_lr = 3e-5
lr_scheduler = "cosine_with_restarts"
lr_scheduler_num_cycles = 2
lr_warmup_steps = 100

# Regularization (proven settings)
min_snr_gamma = 5.0
noise_offset = 0.05
max_grad_norm = 1.0

# Data augmentation (conservative for 3D)
color_aug = false
flip_aug = false
random_crop = false

# Advanced settings
mixed_precision = "fp16"
gradient_checkpointing = true
xformers = false
sdpa = true
max_data_loader_n_workers = 4
persistent_data_loader_workers = true

# Logging
logging_dir = "/mnt/data/ai_data/models/lora/orion/orion_identity/logs"
log_prefix = "orion_identity"
log_with = "tensorboard"

# Sample generation
sample_prompts = "a 3d animated character from DreamWorks' Orion and the Dark (2024), orion, young boy, portrait, anxious expression, studio lighting\na 3d animated character from DreamWorks' Orion and the Dark (2024), orion, full body, blue hoodie and jeans, suburban setting, natural lighting\na 3d animated character from DreamWorks' Orion and the Dark (2024), orion, close-up face, worried expression, warm lighting\na 3d animated character from DreamWorks' Orion and the Dark (2024), orion, three-quarter view, dark hair, nighttime scene, moonlight\na 3d animated character from DreamWorks' Orion and the Dark (2024), orion, in bedroom, dramatic shadows, high contrast lighting\na 3d animated character from DreamWorks' Orion and the Dark (2024), orion, contemporary clothes, backpack, school setting"
sample_every_n_epochs = 2
sample_sampler = "euler_a"

# Training seed
seed = 42

# Metadata
[metadata]
character_name = "Orion"
character_source = "DreamWorks' Orion and the Dark (2024)"
film = "Orion and the Dark"
studio = "DreamWorks Animation"
platform = "Netflix"
style = "3D Animation, DreamWorks Style, Contemporary Cartoony, High Contrast Lighting"
dataset_size = 261
lora_type = "character_identity"
trigger_words = "orion_boy, orion_dreamworks, anxious_boy, orion_and_the_dark, orion_2024"
notes = "Orion Identity LoRA - Protagonist from Orion and the Dark (2024). Dataset: 261 character instances. Film focuses on childhood anxiety and facing fears through fantastical night journey. High contrast day/night lighting is key visual theme."
