# Loose Clustering Configuration
# For animation with similar character designs (anime, modern Western)
#
# Best for:
# - Characters with similar body types and features
# - Shows where characters differ mainly in hair/outfit
# - Multiple characters with same-face syndrome

# Face-based identity clustering (more permissive)
face_clustering:
  face_model: "retinaface"
  embedding_model: "arcface"
  face_confidence: 0.25  # Lower threshold for stylized faces
  min_face_size: 24  # Accept smaller faces
  device: "cuda"
  fallback_to_clip: true
  animation_mode: "2d"

# HDBSCAN with looser parameters
hdbscan:
  min_cluster_size: 30  # Larger clusters
  min_samples: 5  # More permissive core points
  metric: "euclidean"
  cluster_selection_method: "eom"  # Prefer larger, merged clusters
  allow_single_cluster: false

# CLIP clustering (looser)
clip_clustering:
  model: "ViT-B/32"  # Faster model, sufficient for similar chars
  device: "cuda"
  min_cluster_size: 25
  min_samples: 5
  use_umap: true
  umap_n_neighbors: 20  # More neighbors = broader clusters
  umap_n_components: 80
  umap_min_dist: 0.2  # Larger = more inclusive clusters

# Quality filtering (more permissive)
quality_filter:
  enabled: true
  min_resolution: 96
  max_blur_threshold: 80
  remove_duplicates: true
  phash_threshold: 10  # Allow more similar images

# Prefiltering
prefilter:
  enabled: true
  mode: "permissive"
  semantic_filter: true
  min_character_score: 0.25

output:
  save_visualization: true
  save_report: true
  export_format: "json"
  create_cluster_dirs: true
  copy_images: true

processing:
  batch_size: 48
  num_workers: 4

notes: |
  Loose Clustering is best for:
  - Anime with similar character designs (same-face syndrome)
  - Modern 2D animation (Star vs Evil, Gravity Falls)
  - Shows where characters mainly differ by hair/outfit

  Expected behavior:
  - Fewer, larger clusters
  - May need manual splitting during review
  - Fewer images in noise category
  - Better for capturing all instances of a character

  Post-processing recommendations:
  - Use interactive_ui to manually split merged clusters
  - Consider pose subclustering to further separate by view angle
  - Verify character identity by checking a sample from each cluster
