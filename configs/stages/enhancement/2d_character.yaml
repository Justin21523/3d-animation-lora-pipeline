# 2D Character Enhancement Configuration
# Face restoration and upscaling for 2D animation

upscaling:
  model: "realesrgan"
  path: "${models.restoration.realesrgan}"
  scale: 2
  tile_size: 512
  tile_overlap: 32
  
face_enhancement:
  enabled: true
  model: "codeformer"
  path: "${models.restoration.codeformer}"
  fidelity_weight: 0.5  # 0=quality, 1=fidelity
  
contrast:
  enabled: true
  method: "clahe"
  clip_limit: 2.0
  tile_size: 8

quality_filter:
  min_resolution: 256
  max_blur_score: 100
  min_brightness: 30
  max_brightness: 240

output:
  format: "png"
  quality: 95
  preserve_original: true
