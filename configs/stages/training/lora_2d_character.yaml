# LoRA 2D Character Training Configuration
# Optimized for 2D animation character identity

model:
  base: "runwayml/stable-diffusion-v1-5"
  vae: null  # Use built-in VAE
  text_encoder: "clip_vit_l14"

lora:
  network_dim: 32
  network_alpha: 16
  target_modules: ["to_q", "to_v", "to_k", "to_out.0"]
  
training:
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  lr_warmup_steps: 100
  max_train_steps: 2000
  train_batch_size: 2
  gradient_accumulation_steps: 4
  mixed_precision: "fp16"
  
dataset:
  resolution: 512
  center_crop: true
  random_flip: true  # OK for 2D animation
  caption_extension: ".txt"
  
augmentation:
  color_jitter: 0.1  # Light color variation for 2D
  brightness: 0.05
  contrast: 0.05

checkpointing:
  save_every_n_steps: 500
  save_model_as: "safetensors"
  keep_last_n: 5

output:
  logging_dir: "${warehouse.logs}/lora_training"
  output_dir: "${warehouse.training}/lora/characters"
  output_name: "character_lora"
