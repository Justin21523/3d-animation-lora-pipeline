# ============================================================================
# Synthetic Data Generation - Non-Yokai (Pose) 30x5 @ 1024 (SDXL)
# ============================================================================
#
# Goal (per character):
# - 30 POSE prompts
# - 5 images per prompt => 150 images per character
# - Exclude `yokai-watch`
# - Write to a NEW generated_data subdir (avoid overwriting prior runs)
#
# Typical workflow:
#   1) Prompts only:
#      conda run -n ai_env python scripts/batch/synthetic_data_orchestrator.py \
#        --config configs/batch/non_yokai_pose_30x5_20260126.yaml --phase 1
#   2) Round-robin images:
#      conda run -n ai_env python scripts/batch/round_robin_image_generator.py \
#        --config configs/batch/non_yokai_pose_30x5_20260126.yaml
#
# ============================================================================

workspace:
  root: "/mnt/data/ai_data/synthetic_lora_data"
  subdirs:
    logs: "logs"
    checkpoints: "checkpoints"
    generated_data: "generated_data_non_yokai_pose_30x5_20260126"
    filtered_data: "filtered_data"
    datasets: "datasets"

models:
  base_model: "/mnt/c/ai_models/stable-diffusion/checkpoints/sd_xl_base_1.0.safetensors"
  identity_loras_dir: "/mnt/c/ai_models/lora_sdxl/BEST_CHECKPOINTS_COLLECTION"

characters:
  - alberto
  - alberto_seamonster
  - barley_lightfoot
  - bryce
  - caleb
  - elio
  - giulia
  - ian_lightfoot
  - luca
  - luca_seamonster
  - miguel
  - orion
  - russell
  - tyler

character_descriptions:
  default: "a 3D animated character, pixar style"

lora_types:
  - pose

vocabulary_generation:
  num_prompts_per_type: 30
  use_templates: true
  template_variations: 5
  ensure_template_coverage: true
  seed: 20260126

caption_generation:
  enabled: false

image_generation:
  num_images_per_prompt: 5
  num_inference_steps: 40
  guidance_scale: 7.5
  height: 1024
  width: 1024
  use_random_seeds: true
  negative_prompt: "multiple people, two people, group, crowd, duplicate character, duplicate person, clone, second person, extra character, photograph, photo, realistic, photorealistic, real person, real life, live action, hyperrealistic, real human, candid photo, portrait photo, stock photo, anime, 2d, 2d illustration, illustration, flat shading, cel shading, lineart, sketch, manga, adult, elderly, old person, mature, grown-up, old man, baby, toddler, infant, young child, girl, female, woman, extra limbs, extra arms, extra legs, extra hands, extra fingers, missing limbs, missing arms, missing legs, missing hands, missing fingers, deformed, disfigured, distorted, malformed, mutated, mutation, bad anatomy, wrong anatomy, anatomically incorrect, blurry, out of focus, unfocused, fuzzy, hazy, soft focus, low quality, bad quality, worst quality, low resolution, low res, jpeg artifacts, compression artifacts, pixelated, grainy, noisy, watermark, text, signature, username, artist name, bad proportions, gross proportions, unnatural proportions"
  lora_scale: 1.0
  device: "cuda"

resilience:
  max_retries: 3
  retry_delay_seconds: 60
  gpu_recovery_delay_seconds: 120
  enable_checkpointing: true
  checkpoint_filename: "pipeline_progress_non_yokai_pose_30x5_20260126.json"

round_robin:
  checkpoint_filename: "round_robin_progress_non_yokai_pose_30x5_20260126.json"
  filename_suffix: "pose_30x5_20260126"

logging:
  main_log_pattern: "main_pipeline_{timestamp}.log"
  status_log: "status.log"
  error_log: "errors.log"
  log_level: "INFO"

conda:
  env_name: "ai_env"

expected_output:
  total_vocabularies: 14  # 14 characters × 1 lora_type
  total_images_per_character: 150  # 30 prompts × 5 images
  total_images_all: 2100  # 14 characters × 150

