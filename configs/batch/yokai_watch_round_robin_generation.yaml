workspace:
  root: "/mnt/data/ai_data/synthetic_lora_data"
  # Prompt packs generated by generate_yokai_watch_prompt_packs.py
  prompts_root: "/mnt/c/ai_projects/3d-animation-lora-pipeline/prompts/yokai-watch/generated"
  # Where generated images will be written
  output_root: "/mnt/data/ai_data/synthetic_lora_data/generated_data/yokai-watch"
  checkpoint_path: "/mnt/data/ai_data/synthetic_lora_data/checkpoints/yokai_watch_round_robin_checkpoint.json"

models:
  base_model: "/mnt/c/ai_models/stable-diffusion/checkpoints/sd_xl_base_1.0.safetensors"
  lora_root: "/mnt/c/ai_models/lora_sdxl/yokai-watch"
  lora_filename_pattern: "{character}_sdxl_lora.safetensors"

types: ["pose", "action", "expression"]

generation:
  device: "cuda"
  dtype: "fp16"
  height: 1024
  width: 1024
  num_inference_steps: 40
  guidance_scale: 7.5
  lora_scale: 1.0
  variants_per_prompt: 3
  seed_base: 1234
  # Leave empty to use per-prompts file negative_prompt
  negative_prompt: ""

