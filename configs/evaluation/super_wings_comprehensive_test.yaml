# Super Wings Comprehensive LoRA Evaluation
# 每個角色: 30 prompts × 3 seeds × 2 LoRA strengths = 180 images
# 或者: 30 prompts × 3 seeds = 90 images (single LoRA strength)

characters:
  jett:
    name: "jett"
    colors: "red and white"
    personality: "enthusiastic, helpful, optimistic, energetic"
    features: "red jet body with white accents, small compact aircraft, two blue eyes"

  jerome:
    name: "jerome"
    colors: "blue"
    personality: "experienced, wise, calm, mentor-like"
    features: "blue jet body, larger transport aircraft, two blue eyes"

  donnie:
    name: "donnie"
    colors: "yellow and blue"
    personality: "builder, mechanical expert, practical, skilled"
    features: "yellow jet body with blue accents, construction equipment, two blue eyes"

# Negative prompts (共用)
negative_prompt: |
  human, person, people, boy, girl, man, woman, child, humanoid,
  human face, human body, human features, realistic human,
  multiple characters, two characters, group, crowd, duo,
  extra eyes, three eyes, four eyes, multiple eyes, extra limbs,
  wrong colors, incorrect colors, color swap, mismatched colors,
  blurry, low quality, worst quality, bad quality, lowres,
  distorted, deformed, disfigured, mutated, malformed,
  ugly, amateur, draft, unfinished, bad anatomy, bad proportions,
  jpeg artifacts, watermark, text, signature,
  2d, anime style, cartoon, illustration, painting, drawing,
  photographic, photo, photograph, real life,
  cropped, cut off, frame, border,
  noise, grainy, chromatic aberration,
  multiple views, character sheet, reference sheet

# 測試配置
test_config:
  lora_strengths: [0.8, 1.0]
  seeds: [42, 123, 456]
  steps: 40
  cfg_scale: 8.0
  width: 1024
  height: 1024

# ===== 10 ACTIONS (動作) =====
actions:
  - name: "taking_off"
    prompt_template: |
      {character}, solo Super Wings jet character, {colors} mechanical aircraft,
      taking off from runway, wheels leaving ground, upward angle,
      engines glowing with power, determined expression,
      runway background with motion blur, dramatic lighting,
      3d animated robot jet plane, exactly two blue eyes,
      {personality}, {features},
      professional 3d animation, Pixar quality render,
      dynamic action shot, smooth metallic surface

  - name: "mid_flight"
    prompt_template: |
      {character}, single {colors} jet flying through clouds,
      soaring through blue sky, wings level, smooth flight,
      white fluffy clouds around, beautiful sky background,
      happy peaceful expression, wind effects,
      Super Wings 3d mechanical character, two blue eyes,
      {personality}, {features},
      cinematic aerial shot, DreamWorks animation style,
